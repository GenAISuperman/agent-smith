apiVersion: apps/v1
kind: Deployment
metadata:
  name: "smith"
  namespace: "agents-man"
  labels:
    app: "smith"
    team: "man"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "smith"
  template:
    metadata:
      labels:
        app: "smith"
        team: "man"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-smith"
      containers:
        - name: "smith"
          image: "acrshoppoc.azurecr.io/agents/smith:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-smith"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
